<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEMI Tool Hub UIUX Demo</title>
  <style>
    :root {
      --bg: #f6f6f8;
      --surface: #ffffff;
      --ink: #24262d;
      --muted: #6f7480;
      --faint: #a8adb7;
      --line: #dddfe6;
      --line-strong: #bfc4ce;
      --accent: #7a197f;
      --accent-dark: #55145a;
      --red: #dd443c;
      --green: #2e7a52;
      --amber: #8a6418;
      --blue: #35699f;
      --shadow: 0 16px 36px rgba(24, 28, 36, .09);
      --shadow-hover: 0 22px 46px rgba(24, 28, 36, .14);
      --r: 8px;
      --r-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #fbfbfd 0%, var(--bg) 42%, #f0f1f5 100%);
      color: var(--ink);
      font: 16px/1.55 var(--font);
      letter-spacing: 0;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; -webkit-tap-highlight-color: transparent; }

    .nav {
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(221, 223, 230, .86);
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 26px;
      padding: 0 26px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 950;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #101217;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 950;
      letter-spacing: .08em;
    }

    .nav-links {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 26px;
      font-size: 14px;
      font-weight: 850;
    }

    .nav-links a {
      color: #30333a;
      white-space: nowrap;
      transition: color .18s ease;
    }

    .nav-links a:hover { color: var(--accent); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .button {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 8px 18px rgba(24, 28, 36, .08);
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 12px 24px rgba(122, 25, 127, .22);
    }

    .button.primary:hover { background: var(--accent-dark); }

    .menu-dot {
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: repeat(3, 4px);
      grid-auto-rows: 4px;
      gap: 5px;
      align-content: center;
      justify-content: center;
      cursor: pointer;
    }

    .menu-dot span {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #2f3137;
    }

    .hero {
      max-width: 1220px;
      margin: 0 auto;
      padding: 62px 28px 28px;
      text-align: center;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .hero h1 {
      margin: 22px auto 12px;
      max-width: 900px;
      font-size: clamp(38px, 5.5vw, 72px);
      line-height: 1.03;
      letter-spacing: 0;
      font-weight: 950;
    }

    .hero p {
      margin: 0 auto;
      max-width: 820px;
      color: #4f5561;
      font-size: clamp(17px, 2vw, 24px);
      line-height: 1.5;
      font-weight: 500;
    }

    .pills {
      max-width: 980px;
      margin: 34px auto 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, .8);
      color: #393d46;
      font-weight: 850;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, transform .18s ease, border-color .18s ease;
    }

    .pill:hover,
    .pill.active {
      background: #24262d;
      color: #fff;
      border-color: #24262d;
      transform: translateY(-1px);
    }

    .tools-section {
      max-width: 1460px;
      margin: 0 auto;
      padding: 16px 28px 64px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 18px;
    }

    .tool-card {
      min-height: 286px;
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(255, 255, 255, .86);
      text-align: left;
      padding: 28px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(24, 28, 36, .03);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
    }

    .tool-card::after {
      content: "";
      position: absolute;
      inset: auto -42px -48px auto;
      width: 130px;
      height: 130px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--tool-color), transparent 84%);
      transition: transform .24s ease, opacity .24s ease;
      opacity: .72;
    }

    .tool-card:hover {
      transform: translateY(-5px);
      border-color: #2f3137;
      box-shadow: var(--shadow-hover);
      background: #fff;
    }

    .tool-card:hover::after { transform: scale(1.12); opacity: 1; }

    .tool-card:hover .icon {
      transform: translateY(-4px) scale(1.04);
    }

    .tool-card:hover .arrow {
      transform: translateX(4px);
      background: #24262d;
      color: #fff;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--tool-color);
      background: color-mix(in srgb, var(--tool-color), transparent 86%);
      transition: transform .22s ease;
    }

    .icon svg {
      width: 34px;
      height: 34px;
      stroke: currentColor;
      stroke-width: 2.1;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tool-card h2 {
      margin: 26px 0 8px;
      font-size: 25px;
      line-height: 1.18;
      font-weight: 950;
      letter-spacing: 0;
    }

    .tool-card p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      max-width: 330px;
    }

    .card-foot {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status {
      min-height: 28px;
      border-radius: 999px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 950;
      color: var(--tool-color);
      background: color-mix(in srgb, var(--tool-color), transparent 88%);
    }

    .arrow {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #f0f1f4;
      color: #30333a;
      font-weight: 950;
      transition: transform .2s ease, background .2s ease, color .2s ease;
    }

    .detail {
      display: none;
      max-width: 1140px;
      min-height: calc(100vh - 72px);
      margin: 0 auto;
      padding: 70px 28px 48px;
      text-align: center;
    }

    .detail.active { display: block; }

    .detail-icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 22px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--detail-color);
      background: color-mix(in srgb, var(--detail-color), transparent 84%);
    }

    .detail-icon svg {
      width: 42px;
      height: 42px;
      stroke: currentColor;
      stroke-width: 2.1;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .detail h2 {
      margin: 0;
      font-size: clamp(40px, 5vw, 64px);
      line-height: 1.05;
      font-weight: 950;
      letter-spacing: 0;
    }

    .detail .sub {
      max-width: 780px;
      margin: 16px auto 36px;
      color: #4f5561;
      font-size: clamp(17px, 2vw, 24px);
      line-height: 1.5;
    }

    .detail-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 28px;
      align-items: start;
      text-align: left;
    }

    .detail-main {
      text-align: left;
    }

    .detail-main .detail-icon {
      margin-left: 0;
      margin-right: 0;
    }

    .detail-main .sub {
      margin-left: 0;
      margin-right: 0;
    }

    .launch-card {
      position: sticky;
      top: 98px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(255, 255, 255, .86);
      padding: 18px;
      box-shadow: 0 8px 22px rgba(24, 28, 36, .06);
    }

    .launch-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 950;
    }

    .launch-card p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .primary-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 8px;
      background: var(--detail-color);
      color: #fff;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 16px 34px color-mix(in srgb, var(--detail-color), transparent 72%);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .primary-action:hover {
      transform: translateY(-2px);
      filter: saturate(1.08);
      box-shadow: 0 22px 46px color-mix(in srgb, var(--detail-color), transparent 64%);
    }

    .detail-brief {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .brief-block {
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: rgba(255,255,255,.72);
      padding: 18px;
      text-align: left;
    }

    .brief-block strong {
      display: block;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 950;
    }

    .brief-block ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .brief-block li + li {
      margin-top: 6px;
    }

    .back {
      margin-top: 36px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 850;
    }

    .back:hover { color: var(--accent); }

    .home.hidden { display: none; }

    .foot {
      border-top: 1px solid rgba(221, 223, 230, .75);
      background: rgba(255,255,255,.78);
      padding: 18px 28px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    @media (max-width: 1180px) {
      .tool-grid { grid-template-columns: repeat(2, minmax(260px, 1fr)); }
    }

    @media (max-width: 760px) {
      .nav {
        height: auto;
        min-height: 66px;
        grid-template-columns: 1fr auto;
        padding: 10px 16px;
      }
      .nav-links { display: none; }
      .nav-actions .button:not(.primary) { display: none; }
      .hero { padding: 46px 18px 22px; }
      .tools-section { padding: 10px 18px 42px; }
      .tool-grid { grid-template-columns: 1fr; }
      .tool-card { min-height: 248px; padding: 24px; }
      .card-foot { left: 24px; right: 24px; }
      .detail-shell { grid-template-columns: 1fr; }
      .launch-card { position: static; }
      .detail-brief { grid-template-columns: 1fr; }
      .foot { padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a class="brand" href="#" id="brandHome">
      <span class="brand-mark">SEMI</span>
      <span>Tool Hub</span>
    </a>
    <nav class="nav-links">
      <a href="#" data-tool-link="forum">Forum</a>
      <a href="#" data-tool-link="sponsors">Sponsors</a>
      <a href="#" data-tool-link="pavilions">Pavilions</a>
      <a href="#" data-tool-link="trends">Trends</a>
      <a href="index.html">Current Hub</a>
    </nav>
    <div class="nav-actions">
      <a class="button" href="docs/product-principles.md">Docs</a>
      <a class="button primary" href="index.html">開啟目前工具</a>
      <button class="menu-dot" type="button" aria-label="More tools">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main>
    <section class="home" id="homeView">
      <div class="hero">
        <div class="kicker">SEMICON Taiwan Website Operations</div>
        <h1>內容產生器工作台</h1>
        <p>選擇對應的網站區塊工具，快速準備資料、確認可發布狀態，並產生可貼入 Drupal 的 HTML。</p>
        <div class="pills">
          <button class="pill active" type="button" data-filter="all">全部</button>
          <button class="pill" type="button" data-filter="workflow">工作流程</button>
          <button class="pill" type="button" data-filter="content">頁面內容</button>
          <button class="pill" type="button" data-filter="brand">品牌露出</button>
          <button class="pill" type="button" data-filter="interactive">互動區塊</button>
        </div>
      </div>

      <section class="tools-section">
        <div class="tool-grid" id="toolGrid"></div>
      </section>
    </section>

    <section class="detail" id="detailView"></section>
  </main>

  <footer class="foot">
    <span>SEMI Tool Hub demo · UI direction only</span>
    <span>Design principle: keep active workflows familiar, unify the entry experience first.</span>
  </footer>

  <script>
    const icons = {
      forum: `<svg viewBox="0 0 24 24"><path d="M4 5.5h16"/><path d="M4 12h10"/><path d="M4 18.5h7"/><path d="M18 14l2 2-2 2"/><path d="M14 16h6"/></svg>`,
      sponsors: `<svg viewBox="0 0 24 24"><path d="M12 4l2.2 4.8 5.2.6-3.8 3.6 1 5.1L12 15.5 7.4 18.1l1-5.1-3.8-3.6 5.2-.6L12 4z"/></svg>`,
      pavilions: `<svg viewBox="0 0 24 24"><path d="M4 20V9l8-5 8 5v11"/><path d="M8 20v-7h8v7"/><path d="M10 9h4"/></svg>`,
      trends: `<svg viewBox="0 0 24 24"><path d="M5 19V5"/><path d="M5 19h14"/><path d="M8 16l4-5 3 3 4-7"/><path d="M17 7h2v2"/></svg>`
    };

    const tools = [
      {
        id: "forum",
        filter: "content",
        color: "#7a197f",
        title: "Forum HTML Generator",
        zh: "論壇頁 HTML 產生器",
        desc: "整理論壇資料、講者、價格、合作單位和 Logo，輸出中英文論壇頁 HTML。",
        status: "AI Assisted · v9.13",
        action: "開啟 Forum v9.13",
        note: "既有團隊已在使用，入口只負責導向與說明，不重新設計原本操作習慣。",
        path: "tools/forum/index.html",
        fit: ["論壇頁內容更新", "講者、議程、票價與合作單位整理", "需要中英文 HTML 的活動頁"],
        flow: ["貼上或匯入論壇資料", "確認系統解析的欄位與版面", "預覽後複製 Drupal HTML"],
        checks: ["活動名稱與日期正確", "講者與 Logo 顯示完整", "輸出語系與 CMS 版面一致"]
      },
      {
        id: "sponsors",
        filter: "brand",
        color: "#dd443c",
        title: "Sponsors Logo Generator",
        zh: "贊助商 Logo 產生器",
        desc: "管理贊助商 Logo、級別、排序、連結與雙語輸出，支援工作檔備份。",
        status: "Stable · v5.1.1",
        action: "新增 Sponsor Logo",
        note: "主任務是降低 Logo 排版與連結錯誤，工具內保留既有 Logo 管理流程。",
        path: "tools/sponsors/index.html",
        fit: ["贊助商 Logo 區塊更新", "依級別排序品牌露出", "需要保存工作檔供下次續編"],
        flow: ["新增 Logo、級別與連結", "檢查排序與缺漏資料", "輸出中英文 HTML"],
        checks: ["Logo 圖片可正常載入", "贊助級別與排序正確", "外部連結可點擊"]
      },
      {
        id: "pavilions",
        filter: "workflow",
        color: "#2e7a52",
        title: "Pavilions Vendor Generator",
        zh: "專區展商 HTML 產生器",
        desc: "把 Excel 展商名單轉成專區展商卡片，先檢查公司、攤位與網址。",
        status: "Review · v1.1",
        action: "貼上展商名單",
        note: "目前作為 v1.1 信心升級重點，入口語言要強調資料檢查而不是功能堆疊。",
        path: "tools/pavilions/index.html",
        fit: ["專區展商名單上架", "Excel 來源資料轉成展商卡片", "發布前檢查公司、攤位與網址"],
        flow: ["貼上展商名單", "修正缺漏欄位與格式問題", "確認預覽後複製 HTML"],
        checks: ["公司名稱不可空白", "攤位號碼格式一致", "網址缺漏需明確標示"]
      },
      {
        id: "trends",
        filter: "interactive",
        color: "#35699f",
        title: "Trend Table Generator",
        zh: "主題 / 趨勢互動區塊產生器",
        desc: "建立主題卡片、展區、論壇議題與互動抽屜，輸出隔離式 HTML。",
        status: "AI Optional · v4.0",
        action: "建立 Trend Block",
        note: "工具本身是互動區塊編輯器，入口只協助使用者理解適用情境與輸出責任。",
        path: "tools/trends/index.html",
        fit: ["主題趨勢頁互動區塊", "展區、論壇與關鍵字整理", "需要隔離式 HTML/CSS 的頁面內容"],
        flow: ["建立主題與卡片", "調整互動抽屜內容", "預覽並輸出 scoped HTML"],
        checks: ["互動卡片文字完整", "連結與分類正確", "樣式不影響 Drupal 其他區塊"]
      }
    ];

    const homeView = document.getElementById("homeView");
    const detailView = document.getElementById("detailView");
    const toolGrid = document.getElementById("toolGrid");
    const pills = Array.from(document.querySelectorAll(".pill"));

    function renderTools(filter = "all") {
      const visibleTools = filter === "all" ? tools : tools.filter(tool => tool.filter === filter);
      toolGrid.innerHTML = visibleTools.map(tool => `
        <button class="tool-card" type="button" data-tool="${tool.id}" style="--tool-color:${tool.color}">
          <span class="icon">${icons[tool.id]}</span>
          <h2>${tool.zh}</h2>
          <p>${tool.desc}</p>
          <span class="card-foot">
            <span class="status">${tool.status}</span>
            <span class="arrow">→</span>
          </span>
        </button>
      `).join("");
    }

    function openTool(tool) {
      homeView.classList.add("hidden");
      detailView.classList.add("active");
      detailView.style.setProperty("--detail-color", tool.color);
      detailView.innerHTML = `
        <div class="detail-shell">
          <div class="detail-main">
            <div class="detail-icon">${icons[tool.id]}</div>
            <h2>${tool.zh}</h2>
            <p class="sub">${tool.note}</p>
          </div>
          <aside class="launch-card">
            <strong>${tool.status}</strong>
            <p>這裡只做導向與工作前判斷；實際編輯仍進入既有工具，避免已使用團隊重新學習。</p>
            <a class="primary-action" href="${tool.path}">
              ${tool.action}
              <span>→</span>
            </a>
          </aside>
        </div>
        <div class="detail-brief">
          <div class="brief-block">
            <strong>適用情境</strong>
            <ul>${tool.fit.map(item => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="brief-block">
            <strong>編輯者流程</strong>
            <ul>${tool.flow.map(item => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="brief-block">
            <strong>發布前檢查</strong>
            <ul>${tool.checks.map(item => `<li>${item}</li>`).join("")}</ul>
          </div>
        </div>
        <button class="back" type="button" id="backHome">← 回到所有工具</button>
      `;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showHome() {
      detailView.classList.remove("active");
      homeView.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.addEventListener("click", event => {
      const card = event.target.closest("[data-tool]");
      if (card) {
        const tool = tools.find(item => item.id === card.dataset.tool);
        if (tool) openTool(tool);
      }

      const navLink = event.target.closest("[data-tool-link]");
      if (navLink) {
        event.preventDefault();
        const tool = tools.find(item => item.id === navLink.dataset.toolLink);
        if (tool) openTool(tool);
      }

      if (event.target.closest("#backHome") || event.target.closest("#brandHome")) {
        event.preventDefault();
        showHome();
      }
    });

    pills.forEach(pill => {
      pill.addEventListener("click", () => {
        pills.forEach(item => item.classList.remove("active"));
        pill.classList.add("active");
        renderTools(pill.dataset.filter);
      });
    });

    renderTools();
  </script>
</body>
</html>
