<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEMICON Content Tool Hub</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --panel-2: #fafbfc;
      --ink: #17191f;
      --muted: #707784;
      --faint: #a6adb8;
      --line: #dfe3e9;
      --line-2: #c7ced8;
      --brand: #7a197f;
      --brand-dark: #5f1163;
      --blue: #2f5e8f;
      --green: #2f6f52;
      --amber: #8d641d;
      --shadow: 0 18px 48px rgba(17, 24, 39, .11);
      --r: 8px;
      --rail: 76px;
      --top: 58px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--rail) minmax(0, 1fr);
      background: var(--bg);
    }

    .rail {
      background: #0f1115;
      color: #fff;
      display: grid;
      grid-template-rows: var(--top) minmax(0, 1fr) auto;
      border-right: 1px solid #0a0b0e;
      z-index: 10;
    }

    .mark {
      display: grid;
      place-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      font-weight: 900;
      letter-spacing: .08em;
      font-size: 13px;
      color: #fff;
    }

    .tools {
      padding: 10px 8px;
      display: grid;
      gap: 8px;
      align-content: start;
      overflow-y: auto;
    }

    .rail-btn {
      height: 54px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: #cfd4dc;
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 2px;
      position: relative;
    }

    .rail-btn:hover {
      background: rgba(255, 255, 255, .07);
      color: #fff;
    }

    .rail-btn.active {
      background: #fff;
      color: var(--ink);
      border-color: rgba(255, 255, 255, .14);
    }

    .rail-code {
      font-weight: 900;
      font-size: 15px;
      line-height: 1;
    }

    .rail-label {
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: .02em;
    }

    .rail-bottom {
      padding: 8px;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .circle-btn {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: transparent;
      color: #d8dde5;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
    }

    .circle-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, .08);
    }

    .stage {
      min-width: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: var(--top) minmax(0, 1fr);
    }

    .topbar {
      background: rgba(250, 251, 252, .92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 0 14px 0 18px;
      z-index: 8;
    }

    .identity {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .title-block {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .eyebrow {
      font-size: 10px;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      line-height: 1.2;
      font-weight: 900;
      text-transform: uppercase;
      border: 1px solid transparent;
      flex: 0 0 auto;
    }

    .status.stable { color: var(--green); background: #edf7f1; border-color: #cde8d6; }
    .status.ai { color: var(--blue); background: #eef4ff; border-color: #ccd9f5; }
    .status.review { color: var(--amber); background: #fff6e3; border-color: #efd9a8; }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .command {
      width: min(320px, 32vw);
      border: 1px solid var(--line-2);
      border-radius: var(--r);
      background: #fff;
      color: var(--ink);
      outline: none;
      padding: 9px 11px;
      font-size: 12px;
    }

    .command:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(122, 25, 127, .10);
    }

    .action-btn {
      height: 36px;
      border: 1px solid var(--line-2);
      background: #fff;
      color: var(--ink);
      border-radius: var(--r);
      padding: 0 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .action-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    .action-btn.primary {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }

    .action-btn.primary:hover {
      background: var(--brand-dark);
      color: #fff;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      position: relative;
      padding: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      background: #f4f5f7;
    }

    .frame-shell {
      min-width: 0;
      min-height: 0;
      background: #fff;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }

    .frame-strip {
      display: none;
      background: #f8f9fb;
      border-bottom: 1px solid var(--line);
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 9px 0 12px;
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .frame-path {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .frame-controls {
      display: flex;
      gap: 5px;
      flex: 0 0 auto;
    }

    .mini-btn {
      width: 26px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: #3e4653;
      cursor: pointer;
      font-size: 11px;
      font-weight: 900;
      display: grid;
      place-items: center;
    }

    .mini-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .drawer {
      position: fixed;
      top: var(--top);
      right: 0;
      bottom: 0;
      width: min(390px, calc(100vw - var(--rail)));
      background: rgba(255, 255, 255, .97);
      border-left: 1px solid var(--line);
      box-shadow: -18px 0 44px rgba(17, 24, 39, .13);
      transform: translateX(102%);
      transition: transform .22s ease;
      z-index: 20;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .drawer-head p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 12px;
    }

    .drawer-body {
      overflow: auto;
      padding: 14px 16px 20px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line-2);
      border-radius: var(--r);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-weight: 800;
    }

    .close-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    .drawer-section {
      border-top: 1px solid var(--line);
      padding-top: 13px;
    }

    .drawer-section:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .drawer-section h3 {
      margin: 0 0 9px;
      color: #384152;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 7px;
    }

    .list li {
      color: #424b59;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 9px 10px;
      line-height: 1.5;
      font-size: 12px;
    }

    .quick-picker {
      position: fixed;
      top: 68px;
      right: 14px;
      width: min(420px, calc(100vw - 28px));
      background: #fff;
      border: 1px solid var(--line-2);
      box-shadow: var(--shadow);
      border-radius: 10px;
      padding: 8px;
      z-index: 30;
      display: none;
    }

    .quick-picker.open {
      display: grid;
      gap: 6px;
    }

    .quick-item {
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--r);
      cursor: pointer;
      padding: 10px;
      text-align: left;
      display: grid;
      gap: 4px;
    }

    .quick-item:hover,
    .quick-item.active {
      border-color: var(--line);
      background: #f7f8fa;
    }

    .quick-name {
      font-weight: 900;
      color: var(--ink);
    }

    .quick-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .empty {
      color: var(--muted);
      font-size: 12px;
      padding: 10px;
    }

    .veil {
      position: fixed;
      inset: var(--top) 0 0 var(--rail);
      background: rgba(15, 17, 21, .16);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 15;
    }

    .veil.show {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 920px) {
      :root { --rail: 64px; --top: 58px; }
      .topbar {
        grid-template-columns: minmax(0, 1fr);
        align-content: center;
        gap: 5px;
        padding: 7px 10px 8px 12px;
      }
      .actions {
        overflow-x: auto;
        padding-bottom: 2px;
      }
      .command {
        min-width: 190px;
        width: 42vw;
      }
      .tool-title {
        font-size: 14px;
      }
      .frame-shell {
        border-radius: 8px;
      }
      .workspace {
        padding: 7px;
      }
    }

    @media (max-width: 640px) {
      body { overflow: auto; }
      .shell {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: 66px minmax(0, 1fr);
      }
      .rail {
        min-width: 0;
        grid-template-columns: 64px minmax(0, 1fr) 52px;
        grid-template-rows: 66px;
        min-height: 66px;
        height: 66px;
        border-right: 0;
        border-bottom: 1px solid #0a0b0e;
      }
      .mark {
        border-bottom: 0;
        border-right: 1px solid rgba(255, 255, 255, .08);
      }
      .tools {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px;
      }
      .rail-btn {
        width: 58px;
        height: 48px;
        flex: 0 0 auto;
      }
      .rail-bottom {
        padding: 8px;
        border-top: 0;
        border-left: 1px solid rgba(255, 255, 255, .08);
      }
      .stage {
        height: calc(100vh - 66px);
      }
      .drawer {
        top: 66px;
        width: 100vw;
      }
      .veil {
        inset: 66px 0 0 0;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="rail" aria-label="Tool navigation">
      <div class="mark">SEMI</div>
      <nav class="tools" id="railTools"></nav>
      <div class="rail-bottom">
        <button class="circle-btn" id="infoBtn" type="button" title="工具資訊">i</button>
      </div>
    </aside>

    <main class="stage">
      <header class="topbar">
        <div class="identity">
          <span class="status ai" id="statusBadge">AI</span>
          <div class="title-block">
            <div class="eyebrow" id="eyebrow">Content Tool Hub</div>
            <h1 class="tool-title" id="toolTitle">SEMICON Content Tool Hub</h1>
          </div>
        </div>
        <div class="actions">
          <input class="command" id="commandInput" type="search" placeholder="搜尋工具">
          <button class="action-btn" id="reloadBtn" type="button">重載</button>
          <button class="action-btn" id="copyPathBtn" type="button">路徑</button>
          <a class="action-btn" href="uiux-demo.html" target="_blank" rel="noopener">UIUX Demo</a>
          <a class="action-btn primary" id="openToolBtn" href="#" target="_blank" rel="noopener">開新視窗</a>
        </div>
      </header>

      <section class="workspace">
        <div class="frame-shell">
          <div class="frame-strip">
            <span class="frame-path" id="framePath"></span>
            <div class="frame-controls">
              <button class="mini-btn" id="backBtn" type="button" title="上一個工具">L</button>
              <button class="mini-btn" id="nextBtn" type="button" title="下一個工具">R</button>
            </div>
          </div>
          <iframe id="toolFrame" title="SEMICON HTML generator"></iframe>
        </div>
      </section>
    </main>
  </div>

  <div class="quick-picker" id="quickPicker"></div>
  <div class="veil" id="veil"></div>
  <aside class="drawer" id="drawer" aria-label="Tool details">
    <div class="drawer-head">
      <div>
        <h2 id="drawerTitle"></h2>
        <p id="drawerSummary"></p>
      </div>
      <button class="close-btn" id="closeDrawerBtn" type="button">x</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <script>
    const tools = [
      {
        id: "forum",
        code: "FR",
        rail: "Forum",
        name: "論壇頁 HTML 產生器",
        category: "Forum",
        group: "頁面內容",
        version: "v9.11",
        status: "AI Assisted",
        statusClass: "ai",
        path: "tools/forum/index.html",
        summary: "將 ST26 論壇資料、主題、講者、價格、合作單位、報名連結與 Logo 整理成可貼入 Drupal 的中英文 HTML。",
        inputs: ["Excel / CSV 論壇資料", "論壇主題與大綱", "主席、主持人、指導單位", "合作單位文字連結", "Logo 圖片或圖片 URL", "報名與地圖連結"],
        outputs: ["中文版 HTML", "英文版 HTML", "桌機 / 手機預覽", "同瀏覽器草稿保存"],
        improvements: ["確認 v9.11 在 Hub iframe 內的版面", "新增 JSON 專案匯出 / 匯入", "新增 Drupal 貼上前檢查清單"],
        keywords: ["forum", "論壇", "pricing", "logo", "ai", "drupal", "registration", "英文", "中文"]
      },
      {
        id: "trends",
        code: "TH",
        rail: "Theme",
        name: "主題 / 趨勢互動區塊產生器",
        category: "Theme",
        group: "互動區塊",
        version: "v4.0",
        status: "AI Assisted",
        statusClass: "ai",
        path: "tools/trends/index.html",
        summary: "管理 SEMICON 主題卡片、展區、論壇議題與互動抽屜，輸出 CSS 隔離的中英文互動 HTML。",
        inputs: ["主題中英文標題", "展區 / 專區清單", "論壇議題清單", "SVG 圖示 URL", "AI 匯入用網址或文字"],
        outputs: ["中文版互動 HTML", "英文版互動 HTML", "即時 iframe 預覽", "localStorage 自動保存"],
        improvements: ["明確標示 AI 是選用功能", "加入空白欄位檢查", "加入主題快速跳轉"],
        keywords: ["trend", "theme", "主題", "趨勢", "drawer", "互動", "展區", "論壇", "scoped css"]
      },
      {
        id: "sponsors",
        code: "SP",
        rail: "Logo",
        name: "贊助商 Logo HTML 產生器",
        category: "Sponsor",
        group: "品牌露出",
        version: "v5.1.1",
        status: "Stable",
        statusClass: "stable",
        path: "tools/sponsors/index.html",
        summary: "建立贊助商 Logo 分級、排序、連結與雙語輸出，支援資料備份和還原。",
        inputs: ["Logo 圖片貼上或上傳", "贊助商名稱", "贊助級別", "網站連結", "級別中英文名稱"],
        outputs: ["中文版贊助商 HTML", "英文版贊助商 HTML", "JSON 備份檔", "視覺預覽"],
        improvements: ["維持缺漏檢查與備份流程", "下一步統一 Hub 內按鈕與預覽語言", "確認是否需要工具層級 release notes"],
        keywords: ["sponsor", "贊助", "logo", "白金", "金級", "silver", "backup", "json"]
      },
      {
        id: "pavilions",
        code: "PV",
        rail: "Pav.",
        name: "專區展商 HTML 產生器",
        category: "Pavilion",
        group: "展商資料",
        version: "v1.1",
        status: "Needs Review",
        statusClass: "review",
        path: "tools/pavilions/index.html",
        summary: "把展商 Excel 名單轉成專區介紹與展商卡片 HTML，並在複製前檢查公司名稱、攤位與網址。",
        inputs: ["專區名稱", "專區簡介", "技術與應用重點", "Excel 展商名單", "主題色碼"],
        outputs: ["單語系 HTML", "視覺預覽", "發布檢查表", "可複製 Drupal HTML"],
        improvements: ["完成瀏覽器視覺 QA", "決定缺網址是否阻擋複製", "後續評估中英文同時輸出"],
        keywords: ["pavilion", "vendor", "展商", "專區", "booth", "excel", "攤位", "名單"]
      }
    ];

    let activeTool = tools[0];
    let drawerOpen = false;

    const railTools = document.getElementById("railTools");
    const statusBadge = document.getElementById("statusBadge");
    const eyebrow = document.getElementById("eyebrow");
    const toolTitle = document.getElementById("toolTitle");
    const commandInput = document.getElementById("commandInput");
    const openToolBtn = document.getElementById("openToolBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const copyPathBtn = document.getElementById("copyPathBtn");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const framePath = document.getElementById("framePath");
    const toolFrame = document.getElementById("toolFrame");
    const infoBtn = document.getElementById("infoBtn");
    const drawer = document.getElementById("drawer");
    const veil = document.getElementById("veil");
    const closeDrawerBtn = document.getElementById("closeDrawerBtn");
    const drawerTitle = document.getElementById("drawerTitle");
    const drawerSummary = document.getElementById("drawerSummary");
    const drawerBody = document.getElementById("drawerBody");
    const quickPicker = document.getElementById("quickPicker");

    function renderRail() {
      railTools.innerHTML = tools.map(tool => `
        <button class="rail-btn ${tool.id === activeTool.id ? "active" : ""}" type="button" data-tool="${tool.id}" title="${tool.name}">
          <span class="rail-code">${tool.code}</span>
          <span class="rail-label">${tool.rail}</span>
        </button>
      `).join("");
    }

    function renderDrawer(tool) {
      drawerTitle.textContent = tool.name;
      drawerSummary.textContent = tool.summary;
      drawerBody.innerHTML = `
        <section class="drawer-section">
          <h3>輸入</h3>
          <ul class="list">${tool.inputs.map(item => `<li>${item}</li>`).join("")}</ul>
        </section>
        <section class="drawer-section">
          <h3>輸出</h3>
          <ul class="list">${tool.outputs.map(item => `<li>${item}</li>`).join("")}</ul>
        </section>
        <section class="drawer-section">
          <h3>下一輪</h3>
          <ul class="list">${tool.improvements.map(item => `<li>${item}</li>`).join("")}</ul>
        </section>
      `;
    }

    function selectTool(id, options = {}) {
      const tool = tools.find(item => item.id === id) || tools[0];
      activeTool = tool;
      localStorage.setItem("semicon_hub_last_tool", tool.id);

      statusBadge.className = `status ${tool.statusClass}`;
      statusBadge.textContent = tool.statusClass === "ai" ? "AI" : tool.statusClass === "stable" ? "Stable" : "Review";
      eyebrow.textContent = `${tool.category} / ${tool.group} / ${tool.version}`;
      toolTitle.textContent = tool.name;
      framePath.textContent = tool.path;
      openToolBtn.href = tool.path;
      toolFrame.src = tool.path;

      renderRail();
      renderDrawer(tool);
      if (!options.keepPicker) closePicker();
    }

    function openDrawer() {
      drawerOpen = true;
      drawer.classList.add("open");
      veil.classList.add("show");
    }

    function closeDrawer() {
      drawerOpen = false;
      drawer.classList.remove("open");
      veil.classList.remove("show");
    }

    function toggleDrawer() {
      drawerOpen ? closeDrawer() : openDrawer();
    }

    function normalized(value) {
      return String(value || "").toLowerCase();
    }

    function getMatches() {
      const q = normalized(commandInput.value).trim();
      if (!q) return tools;
      return tools.filter(tool => normalized([
        tool.name,
        tool.category,
        tool.group,
        tool.version,
        tool.status,
        tool.summary,
        tool.keywords.join(" ")
      ].join(" ")).includes(q));
    }

    function renderPicker() {
      const matches = getMatches();
      if (!commandInput.value.trim()) {
        closePicker();
        return;
      }

      quickPicker.innerHTML = matches.length
        ? matches.map(tool => `
          <button class="quick-item ${tool.id === activeTool.id ? "active" : ""}" type="button" data-tool="${tool.id}">
            <span class="quick-name">${tool.name}</span>
            <span class="quick-meta">${tool.group} / ${tool.version} / ${tool.status}</span>
          </button>
        `).join("")
        : `<div class="empty">沒有符合的工具</div>`;
      quickPicker.classList.add("open");
    }

    function closePicker() {
      quickPicker.classList.remove("open");
    }

    function moveTool(delta) {
      const index = tools.findIndex(tool => tool.id === activeTool.id);
      const next = tools[(index + delta + tools.length) % tools.length];
      selectTool(next.id);
    }

    railTools.addEventListener("click", event => {
      const button = event.target.closest("[data-tool]");
      if (!button) return;
      selectTool(button.dataset.tool);
    });

    quickPicker.addEventListener("click", event => {
      const button = event.target.closest("[data-tool]");
      if (!button) return;
      selectTool(button.dataset.tool);
      commandInput.value = "";
      closePicker();
    });

    commandInput.addEventListener("input", renderPicker);
    commandInput.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        commandInput.value = "";
        closePicker();
      }
      if (event.key === "Enter") {
        const first = getMatches()[0];
        if (first) {
          selectTool(first.id);
          commandInput.value = "";
          closePicker();
        }
      }
    });

    reloadBtn.addEventListener("click", () => {
      toolFrame.src = activeTool.path;
    });

    copyPathBtn.addEventListener("click", async () => {
      const path = new URL(activeTool.path, window.location.href).href;
      try {
        await navigator.clipboard.writeText(path);
        const old = copyPathBtn.textContent;
        copyPathBtn.textContent = "已複製";
        setTimeout(() => copyPathBtn.textContent = old, 1200);
      } catch (err) {
        window.prompt("複製此路徑", path);
      }
    });

    backBtn.addEventListener("click", () => moveTool(-1));
    nextBtn.addEventListener("click", () => moveTool(1));
    infoBtn.addEventListener("click", toggleDrawer);
    closeDrawerBtn.addEventListener("click", closeDrawer);
    veil.addEventListener("click", () => {
      closeDrawer();
      closePicker();
    });

    document.addEventListener("keydown", event => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        commandInput.focus();
      }
      if (event.key === "Escape") {
        closeDrawer();
        closePicker();
      }
    });

    const lastTool = localStorage.getItem("semicon_hub_last_tool");
    selectTool(tools.some(tool => tool.id === lastTool) ? lastTool : tools[0].id);
  </script>
</body>
</html>
