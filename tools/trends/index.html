<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMICON 主題產生器 v4.0</title>
<style>
:root{
  --pu:#800080;--pu-light:#f5eef5;--pu-mid:#ddc0dd;
  --bg:#f0f0f3;--white:#fff;--bd:#e2e2e6;
  --text:#1d1d1f;--gray:#6e6e73;--danger:#dc3545;--success:#28a745;
  --ai:#1a73e8;--ai-light:#e8f0fe;
  --r:10px;--r-sm:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);height:100vh;
  display:flex;flex-direction:column;overflow:hidden;font-size:13px;}

/* ── HEADER ── */
.app-header{
  background:var(--white);border-bottom:1px solid var(--bd);
  padding:0 20px;height:52px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:100;
}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-brand h1{font-size:14px;font-weight:700;color:var(--pu);}
.version-badge{background:var(--pu-light);color:var(--pu);
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.header-actions{display:flex;align-items:center;gap:8px;}
.save-indicator{font-size:11px;color:var(--success);opacity:0;
  transition:opacity .4s;white-space:nowrap;min-width:80px;text-align:right;}

/* ── BUTTONS ── */
.btn{background:var(--text);color:#fff;border:none;padding:7px 14px;
  border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:600;
  transition:opacity .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{opacity:.82;}
.btn-primary{background:var(--pu);}
.btn-outline{background:transparent;border:1px solid var(--bd);color:var(--text);}
.btn-outline:hover{background:#efefef;opacity:1;}
.btn-ai{background:var(--ai);color:#fff;}
.btn-ai:hover{opacity:.88;}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-danger{background:transparent;border:1px solid #f5c6cb;color:var(--danger);}
.btn-success-outline{background:transparent;border:1px solid #b8ddb8;color:var(--success);}
.btn-dashed{background:transparent;border:1.5px dashed var(--bd);color:var(--gray);
  width:100%;padding:10px;border-radius:var(--r);font-size:12px;cursor:pointer;
  transition:all .18s;font-family:inherit;}
.btn-dashed:hover{border-color:var(--pu);color:var(--pu);background:var(--pu-light);}
.icon-btn{background:transparent;border:1px solid var(--bd);border-radius:var(--r-sm);
  width:32px;height:32px;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;font-size:14px;transition:background .15s;color:var(--gray);}
.icon-btn:hover{background:#f0f0f3;}

/* ── WORKSPACE ── */
.workspace{display:flex;flex:1;min-height:0;}
.editor-pane{width:54%;border-right:1px solid var(--bd);overflow-y:auto;
  background:#f7f7f9;padding:14px;display:flex;flex-direction:column;gap:10px;}
.preview-pane{width:46%;display:flex;flex-direction:column;background:var(--white);}

/* ── PREVIEW ── */
.preview-toolbar{padding:8px 14px;background:#f9f9f9;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lang-toggle{display:flex;border:1px solid var(--bd);border-radius:20px;overflow:hidden;}
.lang-toggle button{border:none;padding:4px 14px;font-size:11px;font-weight:600;
  background:transparent;cursor:pointer;color:var(--gray);transition:all .18s;}
.lang-toggle button.active{background:var(--pu);color:#fff;}
.preview-frame{flex:1;border:none;}
.preview-copy-bar{padding:8px 14px;background:#f9f9f9;border-top:1px solid var(--bd);
  display:flex;gap:8px;flex-shrink:0;}

/* ── AI PANEL ── */
.ai-panel{background:var(--white);border:1.5px solid var(--ai);
  border-radius:var(--r);overflow:hidden;}
.ai-panel-header{padding:11px 14px;display:flex;align-items:center;gap:8px;
  cursor:pointer;user-select:none;background:var(--ai-light);}
.ai-panel-header:hover{background:#dce8fc;}
.ai-panel-icon{font-size:16px;}
.ai-panel-title{font-size:13px;font-weight:700;color:var(--ai);flex:1;}
.ai-panel-sub{font-size:11px;color:#5a8de8;}
.ai-chevron{font-size:10px;color:var(--ai);transition:transform .2s;}
.ai-panel.open .ai-chevron{transform:rotate(180deg);}
.ai-panel-body{display:none;padding:14px;border-top:1px solid #c5d8fb;}
.ai-panel.open .ai-panel-body{display:block;}
.ai-key-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;
  padding:8px 12px;background:#f0f4ff;border-radius:var(--r-sm);border:1px solid #c5d8fb;}
.ai-key-status{font-size:11px;flex:1;color:var(--gray);}
.ai-key-status.has-key{color:var(--success);}
.ai-mode-tabs{display:flex;gap:6px;margin-bottom:10px;}
.ai-mode-btn{flex:1;padding:7px;border:1px solid var(--bd);border-radius:var(--r-sm);
  background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--gray);
  transition:all .18s;text-align:center;}
.ai-mode-btn.active{background:var(--ai);color:#fff;border-color:var(--ai);}
.ai-input-area{width:100%;border:1px solid var(--bd);border-radius:var(--r-sm);
  padding:9px 11px;font-size:12px;font-family:inherit;resize:vertical;min-height:72px;
  outline:none;transition:border-color .18s;line-height:1.5;}
.ai-input-area:focus{border-color:var(--ai);}
.ai-target-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.ai-target-row label{font-size:11px;color:var(--gray);white-space:nowrap;}
.ai-target-row select{flex:1;border:1px solid var(--bd);border-radius:var(--r-sm);
  padding:5px 8px;font-size:12px;font-family:inherit;outline:none;background:var(--white);}
.ai-run-btn{padding:8px 16px;background:var(--ai);color:#fff;border:none;
  border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:700;
  transition:opacity .18s;white-space:nowrap;}
.ai-run-btn:hover{opacity:.88;}
.ai-run-btn:disabled{opacity:.4;cursor:not-allowed;}
.ai-log{margin-top:10px;font-size:11px;color:var(--gray);background:#f8f9ff;
  border-radius:var(--r-sm);padding:8px 10px;min-height:28px;line-height:1.5;
  display:none;}
.ai-log.show{display:block;}
.ai-log.error{color:var(--danger);background:#fff5f5;}
.ai-log.success{color:var(--success);background:#f0fff0;}

/* ── ADVANCED SETTINGS ── */
.adv-settings{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);}
.adv-settings summary{
  padding:10px 14px;cursor:pointer;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;color:var(--gray);
  list-style:none;display:flex;align-items:center;gap:6px;user-select:none;}
.adv-settings summary::-webkit-details-marker{display:none;}
.adv-settings summary:hover{background:#fafafa;}
.adv-settings-body{padding:14px;border-top:1px solid var(--bd);}
.form-row{display:flex;gap:8px;margin-bottom:8px;}
.form-row:last-child{margin-bottom:0;}
.form-group{flex:1;display:flex;flex-direction:column;gap:3px;}
.form-group label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);font-weight:600;}
.form-group input,.form-group select{border:1px solid #ccc;border-radius:var(--r-sm);
  padding:6px 9px;font-size:12px;font-family:inherit;outline:none;transition:border-color .18s;}
.form-group input:focus,.form-group select:focus{border-color:var(--pu);}

/* ── THEME BLOCKS ── */
.theme-block{background:var(--white);border:1px solid var(--bd);
  border-radius:var(--r);overflow:hidden;transition:border-color .18s;}
.theme-block.open{border-color:#cca0cc;}
.theme-header{padding:9px 12px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;user-select:none;
  background:var(--white);transition:background .15s;}
.theme-header:hover{background:#fdf8fd;}
.th-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.th-badge{background:var(--pu-light);color:var(--pu);padding:2px 7px;
  border-radius:4px;font-size:11px;font-family:monospace;font-weight:700;flex-shrink:0;}
.th-title{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.th-controls{display:flex;gap:3px;flex-shrink:0;}
.ctrl-btn{background:#f5f5f7;border:1px solid var(--bd);border-radius:4px;
  padding:3px 7px;font-size:11px;cursor:pointer;color:var(--text);transition:background .15s;}
.ctrl-btn:hover{background:#e5e5e8;}
.ctrl-btn:disabled{opacity:.25;cursor:not-allowed;}
.ctrl-btn.del{color:var(--danger);}
.ctrl-btn.del:hover{background:#fff0f0;border-color:#fcc;}
.ctrl-btn.ai-fill{color:var(--ai);border-color:#c5d8fb;}
.ctrl-btn.ai-fill:hover{background:var(--ai-light);}
.theme-body{padding:14px;border-top:1px solid var(--bd);display:none;background:#fefefe;}
.theme-block.open .theme-body{display:block;}

/* ── LANG GRID ── */
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-bottom:12px;}
.lang-header{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:3px 8px;border-radius:3px;margin-bottom:5px;display:inline-block;}
.col-zh .lang-header{background:#e5f0ff;color:#0066cc;}
.col-en .lang-header{background:#e8f5e9;color:#2e7d32;}
.lang-field{margin-bottom:5px;}
.lang-field:last-child{margin-bottom:0;}
.lang-field label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--gray);font-weight:600;display:block;margin-bottom:3px;}
.lang-field input,.lang-field textarea{width:100%;border:1px solid #ddd;border-radius:var(--r-sm);
  padding:6px 9px;font-size:12px;font-family:inherit;outline:none;transition:border-color .18s;}
.lang-field textarea{resize:vertical;min-height:60px;line-height:1.5;}
.lang-field input:focus,.lang-field textarea:focus{border-color:var(--pu);}

/* ── ITEM LISTS ── */
.item-section{margin-bottom:10px;}
.item-section:last-child{margin-bottom:0;}
.item-section-head{display:flex;align-items:center;justify-content:space-between;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--gray);padding-bottom:6px;border-bottom:1px solid var(--bd);margin-bottom:7px;}
.item-col-labels{display:grid;grid-template-columns:1fr 1fr 1.1fr 24px;gap:5px;
  margin-bottom:4px;padding:0 1px;}
.item-col-labels span{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;}
.item-row{display:grid;grid-template-columns:1fr 1fr 1.1fr 24px;gap:5px;
  margin-bottom:4px;align-items:center;}
.item-row input{border:1px solid #ddd;border-radius:4px;padding:5px 7px;
  font-size:11.5px;font-family:inherit;outline:none;width:100%;transition:border-color .18s;}
.item-row input:focus{border-color:var(--pu);}
.item-row .url-inp{color:#0066aa;}
.item-row .url-inp::placeholder{color:#b0c8dd;}
.item-del{background:transparent;border:1px solid #ecc;color:#cc4444;border-radius:4px;
  width:24px;height:26px;cursor:pointer;font-size:12px;display:flex;align-items:center;
  justify-content:center;transition:background .15s;flex-shrink:0;}
.item-del:hover{background:#fff0f0;}
.empty-note{font-size:11px;color:#bbb;font-style:italic;padding:2px 0 3px;}
.divider{border:none;border-top:1px dashed #eaeaea;margin:10px 0;}
.help-pill{display:inline-block;background:#fff8e1;border:1px solid #ffe082;
  color:#7a6000;font-size:10px;padding:3px 9px;border-radius:12px;
  margin-top:5px;line-height:1.4;}

/* ── API KEY MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;z-index:1000;display:none;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--white);border-radius:var(--r);padding:24px;
  width:420px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.modal-sub{font-size:12px;color:var(--gray);margin-bottom:16px;line-height:1.5;}
.modal-input{width:100%;border:1px solid var(--bd);border-radius:var(--r-sm);
  padding:9px 11px;font-size:13px;font-family:monospace;outline:none;margin-bottom:12px;
  transition:border-color .18s;}
.modal-input:focus{border-color:var(--ai);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-note{font-size:10px;color:var(--gray);margin-top:10px;line-height:1.4;}

/* ── AI FILL INLINE PANEL ── */
.ai-fill-panel{background:var(--ai-light);border:1px solid #c5d8fb;
  border-radius:var(--r-sm);padding:10px;margin-bottom:10px;display:none;}
.ai-fill-panel.show{display:block;}
.ai-fill-title{font-size:11px;font-weight:700;color:var(--ai);margin-bottom:8px;}
.ai-fill-row{display:flex;gap:6px;align-items:flex-start;}
.ai-fill-input{flex:1;border:1px solid #c5d8fb;border-radius:var(--r-sm);
  padding:7px 9px;font-size:12px;font-family:inherit;resize:vertical;min-height:56px;
  outline:none;background:var(--white);}
.ai-fill-input:focus{border-color:var(--ai);}
.ai-fill-btns{display:flex;flex-direction:column;gap:5px;}

/* ── MISC ── */
.copied{background:var(--success)!important;border-color:var(--success)!important;}
.loading-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite;}
@keyframes dots{0%,20%{content:'.';}40%{content:'..';}60%,100%{content:'...';}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="app-header">
  <div class="header-brand">
    <h1>SEMICON 主題產生器</h1>
    <span class="version-badge">v4.0</span>
  </div>
  <div class="header-actions">
    <span class="save-indicator" id="saveIndicator"></span>
    <button class="icon-btn" onclick="showApiKeyModal()" title="設定 API Key">🔑</button>
    <button class="btn btn-outline btn-sm" onclick="clearStorage()" style="color:var(--danger);border-color:#f5c6cb;">🗑</button>
    <button class="btn btn-outline btn-sm" onclick="toggleAll()">展開/收合</button>
    <button class="btn btn-success-outline btn-sm" onclick="copyBoth()">複製中文</button>
    <button class="btn btn-outline btn-sm" onclick="copyBoth('en')">Copy EN</button>
  </div>
</header>

<!-- ═══ WORKSPACE ═══ -->
<div class="workspace">

  <!-- LEFT: EDITOR -->
  <div class="editor-pane">

    <!-- AI PANEL -->
    <div class="ai-panel" id="aiPanel">
      <div class="ai-panel-header" onclick="toggleAiPanel()">
        <span class="ai-panel-icon">🤖</span>
        <span class="ai-panel-title">AI 智慧匯入</span>
        <span class="ai-panel-sub">貼入網址或文字，自動填入欄位</span>
        <span class="ai-chevron">▼</span>
      </div>
      <div class="ai-panel-body">
        <div class="ai-key-row">
          <span class="ai-key-status" id="aiKeyStatus">⚪ 尚未設定 API Key</span>
          <button class="btn btn-ai btn-sm" onclick="showApiKeyModal()">設定 Key</button>
        </div>
        <div class="ai-mode-tabs">
          <button class="ai-mode-btn active" id="modeUrl" onclick="setAiMode('url')">🔗 貼入網址</button>
          <button class="ai-mode-btn" id="modeText" onclick="setAiMode('text')">📋 貼入文字</button>
        </div>
        <textarea class="ai-input-area" id="aiInput" placeholder="貼入 SEMICON Taiwan 的活動網址，或直接貼上論壇/展區相關文字內容…"></textarea>
        <div class="ai-target-row">
          <label>匯入至：</label>
          <select id="aiTarget">
            <option value="all">所有主題（自動對應）</option>
          </select>
          <button class="ai-run-btn" id="aiRunBtn" onclick="runAiImport()">開始分析</button>
        </div>
        <div class="ai-log" id="aiLog"></div>
      </div>
    </div>

    <!-- THEME LIST -->
    <div id="themeList"></div>
    <button class="btn-dashed" onclick="addTheme()">＋ 新增主題區塊</button>

    <!-- ADVANCED SETTINGS -->
    <details class="adv-settings">
      <summary>⚙️ 進階設定（欄位標題 / 字型 / 手機欄數）</summary>
      <div class="adv-settings-body">
        <div class="form-row">
          <div class="form-group"><label>展區欄標題 ZH</label><input id="gl1_zh" value="展區 / 專區" oninput="schedulePreview();saveToStorage()"></div>
          <div class="form-group"><label>展區欄標題 EN</label><input id="gl1_en" value="Exhibition Zone" oninput="schedulePreview();saveToStorage()"></div>
          <div class="form-group"><label>論壇欄標題 ZH</label><input id="gl2_zh" value="論壇議題" oninput="schedulePreview();saveToStorage()"></div>
          <div class="form-group"><label>論壇欄標題 EN</label><input id="gl2_en" value="Forum Topics" oninput="schedulePreview();saveToStorage()"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>抽屜前綴 ZH</label><input id="prefix_zh" value="主題" oninput="schedulePreview();saveToStorage()"></div>
          <div class="form-group"><label>抽屜前綴 EN</label><input id="prefix_en" value="THEME" oninput="schedulePreview();saveToStorage()"></div>
          <div class="form-group"><label>空白佔位 ZH</label><input id="cs_zh" value="即將公布" oninput="schedulePreview();saveToStorage()"></div>
          <div class="form-group"><label>空白佔位 EN</label><input id="cs_en" value="Coming soon" oninput="schedulePreview();saveToStorage()"></div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:0.6;"><label>字型縮放</label>
            <input id="fsScale" value="1.15" type="number" step="0.05" min="0.7" max="2" oninput="schedulePreview();saveToStorage()"></div>
          <div class="form-group" style="flex:0.6;">
            <label>手機版欄數（480px）</label>
            <select id="mobileCols" onchange="schedulePreview();saveToStorage()">
              <option value="1">1 欄</option>
              <option value="2" selected>2 欄</option>
            </select>
          </div>
        </div>
      </div>
    </details>

  </div>

  <!-- RIGHT: LIVE PREVIEW -->
  <div class="preview-pane">
    <div class="preview-toolbar">
      <span style="font-size:11px;color:var(--gray);">即時預覽</span>
      <div class="lang-toggle">
        <button id="btnZH" class="active" onclick="setLang('zh')">中文</button>
        <button id="btnEN" onclick="setLang('en')">English</button>
      </div>
      <span style="margin-left:auto;font-size:10px;color:#bbb;" id="previewStatus">等待變更…</span>
    </div>
    <iframe class="preview-frame" id="previewFrame" title="即時預覽"></iframe>
    <div class="preview-copy-bar">
      <button class="btn btn-outline btn-sm" style="flex:1;" onclick="copyBoth()" id="copyZhBtn">複製中文代碼</button>
      <button class="btn btn-outline btn-sm" style="flex:1;" onclick="copyBoth('en')" id="copyEnBtn">Copy English Code</button>
    </div>
  </div>

</div>

<!-- ═══ API KEY MODAL ═══ -->
<div class="modal-overlay" id="apiKeyModal">
  <div class="modal-box">
    <div class="modal-title">🔑 設定 Anthropic API Key</div>
    <div class="modal-sub">Key 只儲存在你的瀏覽器本地（localStorage），不會上傳至任何伺服器。每位使用者需設定自己的 Key。</div>
    <input class="modal-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-...">
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeApiKeyModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveApiKey()">儲存</button>
    </div>
    <div class="modal-note">
      取得 API Key：前往 <a href="https://console.anthropic.com" target="_blank" style="color:var(--ai);">console.anthropic.com</a> → API Keys → Create Key
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════
let themes = [
  {icon_url:"",title_zh:"AI 算力",title_en:"AI Computing",sub_zh:"AI Accelerator · AI EDA · ASIC",sub_en:"AI Accelerator · AI EDA · ASIC",desc_zh:"",desc_en:"",showZone:true,showForum:true,zones:[{zh:"AI 半導體技術特區",en:"AI Semiconductor Technology Zone",url:""}],forums:[{zh:"AI Computing Forum（AI 算力技術論壇）",en:"AI Computing Forum",url:""},{zh:"IC Forum（先進製程全面 AI 化）",en:"IC Forum — Full AI Integration in Advanced Process",url:""}]},

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    const opt = document.createElement('option');

  themes.forEach((t,i) => {
    const id = String(i+1).padStart(2,'0');

          <button class="ctrl-btn" onclick="moveT(${i},1)" ${i===themes.length-1?'disabled':''}>▼</button>
          <button class="ctrl-btn del" onclick="delT(${i})">✖</button>
        </div>
      </div>

        <!-- AI fill panel -->
        <div class="ai-fill-panel" id="aifill-${i}">
          <div class="ai-fill-title">🤖 AI 填入「${t.title_zh}」</div>
          <div class="ai-fill-row">
            <textarea class="ai-fill-input" id="aifill-input-${i}" placeholder="貼入網址（如論壇頁面網址）或相關文字內容…"></textarea>

          </div>

        <span class="help-pill">💡 請設計師上傳 SVG 後將 URL 貼入此欄。留空不顯示圖示。</span>
        <div style="margin-top:10px;"></div>

        <!-- ZH / EN -->

          <div class="col-zh">
            <span class="lang-header">🇹🇼 中文</span>
            <div class="lang-field"><label>主標題</label><input value="${esc(t.title_zh)}" oninput="upd(${i},'title_zh',this.value);document.getElementById('tht-${i}').innerText=this.value||'未命名';document.querySelector('#aifill-${i} .ai-fill-title').textContent='🤖 AI 填入「'+(this.value||'未命名')+'」'"></div>

    // bind oninput for preview on all inputs/textareas inside this block
    block.querySelectorAll('input,textarea,select').forEach(el => {
      el.addEventListener('input', schedulePreview);
      el.addEventListener('change', schedulePreview);
    });
  });

function renderRows(i,key){
  const arr=themes[i][key];
  if(!arr||arr.length===0) return `<div class="empty-note">（空，輸出顯示即將公布 / Coming soon）</div>`;
  return arr.map((item,j)=>`<div class="item-row">
    <input value="${esc(item.zh)}" oninput="updItem(${i},'${key}',${j},'zh',this.value)" placeholder="中文">
    <input value="${esc(item.en)}" oninput="updItem(${i},'${key}',${j},'en',this.value)" placeholder="English">
    <input class="url-inp" value="${esc(item.url)}" oninput="updItem(${i},'${key}',${j},'url',this.value)" placeholder="https://...">
    <button class="item-del" onclick="delItem(${i},'${key}',${j})">✕</button>
  </div>`).join('');
}

// ════════════════════════════════════════════
// MUTATIONS
// ════════════════════════════════════════════
function upd(i,k,v){themes[i][k]=v;schedulePreview();saveToStorage();}
function updItem(i,l,j,k,v){themes[i][l][j][k]=v;schedulePreview();saveToStorage();}
function addItem(i,key){
  themes[i][key].push({zh:'',en:'',url:''});
  document.getElementById(key+'-'+i).innerHTML=renderRows(i,key);
  document.getElementById(key+'-'+i).querySelectorAll('input').forEach(el=>el.addEventListener('input',()=>{schedulePreview();saveToStorage();}));
  schedulePreview();saveToStorage();
}
function delItem(i,key,j){themes[i][key].splice(j,1);document.getElementById(key+'-'+i).innerHTML=renderRows(i,key);schedulePreview();saveToStorage();}
function addTheme(){
  themes.push({icon_url:'',title_zh:'新主題',title_en:'New Theme',sub_zh:'副標題',sub_en:'Subtitle',desc_zh:'',desc_en:'',showZone:false,showForum:false,zones:[],forums:[]});
  renderList();schedulePreview();saveToStorage();
  const blocks=document.querySelectorAll('.theme-block');
  blocks.forEach(b=>b.classList.remove('open'));
  const last=blocks[blocks.length-1];last.classList.add('open');
  last.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function delT(i){if(confirm('確定刪除「'+themes[i].title_zh+'」？')){themes.splice(i,1);renderList();schedulePreview();saveToStorage();}}
function moveT(i,dir){
  if(i+dir<0||i+dir>=themes.length)return;
  [themes[i],themes[i+dir]]=[themes[i+dir],themes[i]];
  renderList();schedulePreview();saveToStorage();
}
function toggleBlock(h){h.parentElement.classList.toggle('open');}
function toggleSection(id,show){const el=document.getElementById(id);if(el)el.style.display=show?'':'none';}
let allOpen=false;
function toggleAll(){allOpen=!allOpen;document.querySelectorAll('.theme-block').forEach(b=>b.classList.toggle('open',allOpen));}

// AI PANEL TOGGLE
// ════════════════════════════════════════════
function toggleAiPanel(){document.getElementById('aiPanel').classList.toggle('open');}
let aiMode='url';
function setAiMode(m){
  aiMode=m;
  document.getElementById('modeUrl').classList.toggle('active',m==='url');
  document.getElementById('modeText').classList.toggle('active',m==='text');
  document.getElementById('aiInput').placeholder = m==='url'
    ? '貼入 SEMICON Taiwan 的活動網址，例如 https://www.semicontaiwan.org/...'
    : '貼上論壇介紹、展區說明等相關文字內容…';
}
function toggleAiFill(i){
  const p=document.getElementById('aifill-'+i);
  p.classList.toggle('show');
  if(p.classList.contains('show')) document.getElementById('aifill-input-'+i).focus();
}

// ════════════════════════════════════════════
// LIVE PREVIEW
// ════════════════════════════════════════════
let previewTimer=null;
let prevLang='zh';

function schedulePreview(){
  clearTimeout(previewTimer);
  document.getElementById('previewStatus').textContent='更新中…';
  previewTimer=setTimeout(updatePreview,700);
}

function updatePreview(){
  const html=buildHTML(prevLang);
  document.getElementById('previewFrame').srcdoc=html;
  document.getElementById('previewStatus').textContent='已更新';
  setTimeout(()=>{document.getElementById('previewStatus').textContent='';},2000);
}

function setLang(l){
  prevLang=l;
  document.getElementById('btnZH').classList.toggle('active',l==='zh');
  document.getElementById('btnEN').classList.toggle('active',l==='en');
  updatePreview();
}

function buildCards(lang, uid) {
  const csText = lang==='zh'?document.getElementById('cs_zh').value:document.getElementById('cs_en').value;
  const gl1    = lang==='zh'?document.getElementById('gl1_zh').value:document.getElementById('gl1_en').value;
  const gl2    = lang==='zh'?document.getElementById('gl2_zh').value:document.getElementById('gl2_en').value;
  const prefix = lang==='zh'?document.getElementById('prefix_zh').value:document.getElementById('prefix_en').value;

  return themes.map((t,i)=>{
    const id    = String(i+1).padStart(2,'0');
    const title = lang==='zh'?t.title_zh:t.title_en;
    const sub   = lang==='zh'?t.sub_zh:t.sub_en;
    const desc  = lang==='zh'?t.desc_zh:t.desc_en;

    const iconHtml = t.icon_url
      ? `<div class="st-card-icon-wrap"><img src="${t.icon_url}" alt="${title}" loading="lazy"></div>`
      : '';

    const zoneHtml = (!t.zones||t.zones.length===0)
      ? `<p class="st-cs">${csText}</p>`
      : `<ul class="st-d-list">${t.zones.map(z=>{const tx=lang==='zh'?z.zh:z.en;const inner=z.url?`<a href="${z.url}" target="_blank" rel="noopener">${tx}</a>`:tx;return`<li>${inner}</li>`;}).join('')}</ul>`;

    const forumHtml = (!t.forums||t.forums.length===0)
      ? `<p class="st-cs">${csText}</p>`
      : `<ul class="st-d-list">${t.forums.map(f=>{const tx=lang==='zh'?f.zh:f.en;const inner=f.url?`<a href="${f.url}" target="_blank" rel="noopener">${tx}</a>`:tx;return`<li>${inner}</li>`;}).join('')}</ul>`;

    const descHtml = desc
      ? `<p class="st-d-desc">${desc}</p>`
      : `<p class="st-d-desc st-d-desc-empty"></p>`;

    const cols = [];
    if(t.showZone)  cols.push(`<div><span class="st-d-label">${gl1}</span>${zoneHtml}</div>`);
    if(t.showForum) cols.push(`<div><span class="st-d-label">${gl2}</span>${forumHtml}</div>`);
    const gridCols = cols.length===1?'1fr':'1fr 1.3fr';
    const gridHtml = cols.length>0
      ? `<div class="st-d-grid" style="grid-template-columns:${gridCols};">${cols.join('')}</div>`
      : '';

    return `        <div class="st-card" tabindex="0">
            <div class="st-num-wrap">${id}</div>
            ${iconHtml}
            <div class="st-card-title">${title}</div>
            <div class="st-card-sub">${sub}</div>
            <div class="st-card-bar"></div>
            <span class="st-caret"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
            <div class="st-data">
                <div class="st-d-header">
                    <div><div class="st-d-eye">${prefix} ${id}</div><div class="st-d-title">${title}</div></div>
                    <div>${descHtml}</div>
                </div>
                ${gridHtml}
            </div>
        </div>`;
  }).join('\n');
}

function buildOutputJS(uid) {
  return `<script>
(function(){
  var g=document.getElementById('${uid}-g');
  if(!g)return;
  var cards=Array.prototype.slice.call(g.querySelectorAll('.st-card'));
  var drw=document.getElementById('${uid}-d');
  var dc=document.getElementById('${uid}-c');
  var ac=null;
  function closeAll(){drw.classList.remove('open');if(ac)ac.classList.remove('active');ac=null;}
  function toggle(card){
    var same=ac===card;closeAll();
    if(!same){
      card.classList.add('active');ac=card;
      var d=card.querySelector('.st-data');if(d)dc.innerHTML=d.innerHTML;
      var ft=cards[0].offsetTop,cols=0;
      for(var i=0;i<cards.length;i++){if(cards[i].offsetTop===ft)cols++;else break;}
      if(!cols)cols=1;
      var row=Math.floor(cards.indexOf(card)/cols);
      var last=Math.min((row+1)*cols-1,cards.length-1);
      g.insertBefore(drw,cards[last].nextSibling);
      setTimeout(function(){drw.classList.add('open');drw.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
    }
  }
  cards.forEach(function(c){
    c.addEventListener('click',function(){toggle(c);});
    c.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle(c);}});
  });
  drw.querySelector('.st-close').addEventListener('click',closeAll);
})();
<\/script>`;
}

function buildHTML(lang) {
  const scale = parseFloat(document.getElementById('fsScale').value)||1.15;
  const uid   = 'st'+Math.random().toString(36).slice(2,8);
  const sc    = '.'+uid;
  const mobileCols = document.getElementById('mobileCols').value||'2';
  const css   = buildOutputCSS(scale,sc,mobileCols);
  const cards = buildCards(lang,uid);
  const js    = buildOutputJS(uid);
  const comment = lang==='zh'
    ? '<!-- SEMICON Taiwan 2026 | 互動展區選單 — 中文版 -->'
    : '<!-- SEMICON Taiwan 2026 | Interactive Theme Blocks — English -->';
  const drawer = `        <div class="st-drawer" id="${uid}-d">
            <div class="st-drawer-inner">
                <button class="st-close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                <div id="${uid}-c"></div>
            </div>
        </div>`;
  return `${comment}\n${css}\n<div class="${uid}">\n    <div class="st-grid" id="${uid}-g">\n${cards}\n${drawer}\n    </div>\n</div>\n\n${js}`;
}

function copyBoth(lang){

  tmp.select();

}

const API_KEY_STORAGE = 'semicon_anthropic_key';

function getApiKey(){return localStorage.getItem(API_KEY_STORAGE)||'';}

function showApiKeyModal(){
  document.getElementById('apiKeyInput').value = getApiKey();
  document.getElementById('apiKeyModal').classList.add('show');
  document.getElementById('apiKeyInput').focus();
}
function closeApiKeyModal(){document.getElementById('apiKeyModal').classList.remove('show');}
function saveApiKey(){
  const key = document.getElementById('apiKeyInput').value.trim();
  if(key) localStorage.setItem(API_KEY_STORAGE, key);
  else localStorage.removeItem(API_KEY_STORAGE);
  closeApiKeyModal();
  updateKeyStatus();
}
function updateKeyStatus(){
  const el = document.getElementById('aiKeyStatus');
  const key = getApiKey();
  if(key){el.textContent='🟢 API Key 已設定';el.className='ai-key-status has-key';}
  else{el.textContent='⚪ 尚未設定 API Key';el.className='ai-key-status';}
}
document.getElementById('apiKeyModal').addEventListener('click',function(e){if(e.target===this)closeApiKeyModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeApiKeyModal();});

// ════════════════════════════════════════════
// AI IMPORT
// ════════════════════════════════════════════
async function callClaude(systemPrompt, userMsg) {
  const key = getApiKey();
  if(!key) throw new Error('請先設定 API Key（點右上角 🔑）');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:4000,
      system: systemPrompt,
      messages:[{role:'user',content:userMsg}],
      tools:[{type:'web_search_20250305',name:'web_search'}]
    })
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error((err.error&&err.error.message)||'API 錯誤 '+res.status);
  }
  const data = await res.json();
  const textBlock = data.content.find(b=>b.type==='text');
  return textBlock ? textBlock.text : '';
}

function showLog(elId, msg, type=''){
  const el=document.getElementById(elId);
  if(!el)return;
  el.className='ai-log show'+(type?' '+type:'');
  el.textContent=msg;
}

async function runAiImport(){
  const input = document.getElementById('aiInput').value.trim();
  if(!input){showLog('aiLog','請先貼入網址或文字內容','error');return;}
  const target = document.getElementById('aiTarget').value;
  const btn = document.getElementById('aiRunBtn');
  btn.disabled=true;btn.textContent='分析中';btn.classList.add('loading-dots');
  showLog('aiLog','正在呼叫 AI，請稍候…');

  try{
    if(target==='all'){
      const raw = await callClaude(SYSTEM_ALL, input);
      const cleaned = raw.replace(/```json|```/g,'').trim();
      const data = JSON.parse(cleaned);
      let updated=0;
      if(data.themes&&Array.isArray(data.themes)){
        data.themes.forEach(td=>{
          const idx=(td.index||1)-1;
          if(idx>=0&&idx<themes.length){
            if(td.title_zh) themes[idx].title_zh=td.title_zh;
            if(td.title_en) themes[idx].title_en=td.title_en;
            if(td.zones&&td.zones.length){themes[idx].zones=td.zones;themes[idx].showZone=true;}
            if(td.forums&&td.forums.length){themes[idx].forums=td.forums;themes[idx].showForum=true;}
            updated++;
          }
        });
      }
      renderList();schedulePreview();saveToStorage();
      showLog('aiLog','✓ 已更新 '+updated+' 個主題','success');
    } else {
      const idx=parseInt(target);
      const raw = await callClaude(SYSTEM_SINGLE, input);
      const cleaned = raw.replace(/```json|```/g,'').trim();
      const td = JSON.parse(cleaned);
      if(td.title_zh) themes[idx].title_zh=td.title_zh;
      if(td.title_en) themes[idx].title_en=td.title_en;
      if(td.sub_zh) themes[idx].sub_zh=td.sub_zh;
      if(td.sub_en) themes[idx].sub_en=td.sub_en;
      if(td.desc_zh) themes[idx].desc_zh=td.desc_zh;
      if(td.desc_en) themes[idx].desc_en=td.desc_en;
      if(td.zones&&td.zones.length){themes[idx].zones=td.zones;themes[idx].showZone=true;}
      if(td.forums&&td.forums.length){themes[idx].forums=td.forums;themes[idx].showForum=true;}
      renderList();schedulePreview();saveToStorage();
      showLog('aiLog','✓ 已更新「'+themes[idx].title_zh+'」','success');
    }
  }catch(e){
    showLog('aiLog','錯誤：'+e.message,'error');
  }finally{
    btn.disabled=false;btn.textContent='開始分析';btn.classList.remove('loading-dots');
  }
}

async function runAiFillTheme(i){
  const input = document.getElementById('aifill-input-'+i).value.trim();
  if(!input){showLog('aifill-log-'+i,'請先貼入網址或文字','error');return;}
  showLog('aifill-log-'+i,'分析中…');
  try{
    const raw = await callClaude(SYSTEM_SINGLE, input);
    const cleaned = raw.replace(/```json|```/g,'').trim();
    const td = JSON.parse(cleaned);
    if(td.title_zh) themes[i].title_zh=td.title_zh;
    if(td.title_en) themes[i].title_en=td.title_en;
    if(td.sub_zh) themes[i].sub_zh=td.sub_zh;
    if(td.sub_en) themes[i].sub_en=td.sub_en;
    if(td.desc_zh) themes[i].desc_zh=td.desc_zh;
    if(td.desc_en) themes[i].desc_en=td.desc_en;
    if(td.zones&&td.zones.length){themes[i].zones=td.zones;themes[i].showZone=true;}
    if(td.forums&&td.forums.length){themes[i].forums=td.forums;themes[i].showForum=true;}
    renderList();schedulePreview();saveToStorage();
    showLog('aifill-log-'+i,'✓ 填入完成','success');
  }catch(e){
    showLog('aifill-log-'+i,'錯誤：'+e.message,'error');
  }
}

// LOCALSTORAGE
// ════════════════════════════════════════════
const STORAGE_KEY = 'semicon_generator_v4';

function saveToStorage(){
  try{
    const g={gl1_zh:document.getElementById('gl1_zh').value,gl1_en:document.getElementById('gl1_en').value,gl2_zh:document.getElementById('gl2_zh').value,gl2_en:document.getElementById('gl2_en').value,prefix_zh:document.getElementById('prefix_zh').value,prefix_en:document.getElementById('prefix_en').value,cs_zh:document.getElementById('cs_zh').value,cs_en:document.getElementById('cs_en').value,fsScale:document.getElementById('fsScale').value,mobileCols:document.getElementById('mobileCols').value};
    localStorage.setItem(STORAGE_KEY,JSON.stringify({themes,globals:g}));
    flashSave();
  }catch(e){}
}
function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const s=JSON.parse(raw);
    if(s.themes&&Array.isArray(s.themes))themes=s.themes;
    if(s.globals){const g=s.globals;Object.keys(g).forEach(id=>{const el=document.getElementById(id);if(el)el.value=g[id];});}
    return true;
  }catch(e){return false;}
}
function clearStorage(){
  if(!confirm('確定要清除所有已儲存的資料，並還原為預設值嗎？'))return;
  localStorage.removeItem(STORAGE_KEY);location.reload();
}
function flashSave(){
  const el=document.getElementById('saveIndicator');
  if(!el)return;
  el.textContent='✓ 已儲存';el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0';},1800);
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
window.onload = () => {
  const restored = loadFromStorage();
  renderList();
  updateKeyStatus();
  updatePreview();
  if(restored){
    const el=document.getElementById('saveIndicator');
    if(el){el.textContent='✓ 已載入上次資料';el.style.opacity='1';setTimeout(()=>{el.style.opacity='0';},2500);}
  }
};
